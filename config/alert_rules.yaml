alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95 > 4000 for 15m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#high-latency-p95

  - name: critical_latency
    severity: P1
    condition: latency_p95 > 6000 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#critical-latency

  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 5 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#high-error-rate

  - name: low_quality
    severity: P2
    condition: quality_avg < 0.7 for 15m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#low-quality

  - name: cost_spike
    severity: P2
    condition: avg_cost_usd > 2x_baseline for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#cost-spike